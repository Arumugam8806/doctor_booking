<!-- templates/failure.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Booking Failed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fbeaea;
            text-align: center;
            padding: 100px;
        }
        .container {
            background-color: #fff0f0;
            border: 1px solid #ffcccc;
            display: inline-block;
            padding: 40px;
            border-radius: 10px;
        }
        h1 {
            color: #d9534f;
        }
        p {
            color: #333;
            font-size: 18px;
        }
        a {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #d9534f;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Booking Failed</h1>
        <p>{{ error }}</p>
        <a href="{{ url_for('book_appointment') }}">← Try Again</a>
    </div>
</body>
</html>
