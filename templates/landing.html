<!-- templates/landing.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Appointment Booking</title>
    <style>
        /* -------------------------------
           Global Styles & Background
        ------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(120deg, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 1s ease;
        }

        /* Animated background effect */
        .background {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: url('https://cdn.pixabay.com/photo/2017/07/03/23/26/doctor-2467288_1280.jpg') center/cover no-repeat;
            opacity: 0.2;
            filter: blur(6px);
            z-index: -1;
        }

        /* -------------------------------
           Card Container
        ------------------------------- */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 50px 80px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-size: 2.5em;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.3);
        }

        p {
            color: #f5f5f5;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        /* -------------------------------
           Button Styles
        ------------------------------- */
        .btn {
            display: inline-block;
            padding: 14px 40px;
            margin: 15px;
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn::before {
            content: "";
            position: absolute;
            width: 0%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(255,255,255,0.2);
            transition: width 0.4s;
        }

        .btn:hover::before {
            width: 100%;
        }

        /* -------------------------------
           Floating Animation
        ------------------------------- */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .btn {
            animation: float 3s ease-in-out infinite;
        }

        /* -------------------------------
           Fade-in Animation
        ------------------------------- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0px); }
        }

        /* -------------------------------
           Footer Text
        ------------------------------- */
        .footer {
            position: absolute;
            bottom: 20px;
            color: #fff;
            font-size: 0.9em;
            text-align: center;
            width: 100%;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <h1>Doctor Appointment Booking</h1>
        <p>Book your doctor appointments quickly, easily, and securely.</p>

        <a href="{{ url_for('patient') }}"><button class="btn">Patient</button></a>
        <a href="{{ url_for('admin_login') }}"><button class="btn">Admin</button></a>
    </div>

    <div class="footer">
        © 2025 Doctor Appointment System | HealthCare Simplified
    </div>

    <script>
        // Smooth background color transitions
        const colors = [
            ["#74ebd5", "#ACB6E5"],
            ["#89f7fe", "#66a6ff"],
            ["#a8edea", "#fed6e3"],
            ["#f6d365", "#fda085"]
        ];

        let current = 0;
        setInterval(() => {
            current = (current + 1) % colors.length;
            document.body.style.background = `linear-gradient(120deg, ${colors[current][0]}, ${colors[current][1]})`;
        }, 6000);

        // Button click ripple animation
        document.querySelectorAll(".btn").forEach(btn => {
            btn.addEventListener("click", function (e) {
                let ripple = document.createElement("span");
                ripple.classList.add("ripple");
                ripple.style.left = `${e.offsetX}px`;
                ripple.style.top = `${e.offsetY}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>

    <style>
        /* Ripple animation for button click */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            background: rgba(255, 255, 255, 0.6);
            width: 100px;
            height: 100px;
            pointer-events: none;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(3);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
